spring.config.import=optional:file:.env[.properties]

spring.application.name=transaction-service
server.port=8082


#MYSQL DATABASE CONNECTION
#spring.datasource.url=jdbc:mysql://localhost:3306/nova_bank_transaction_db
#spring.datasource.username=root
#spring.datasource.password=12345678

#JPA/Hibernate config
#spring.jpa.hibernate.ddl-auto=update



#POSTGRESS DATABASE CONNECTION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#JPA/Hibernate config
spring.jpa.hibernate.ddl-auto=update

#EUREKA Discover
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/


#kafka config
spring.kafka.bootstrap-servers=localhost:9092

#Kafka Config as a Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type=true


#JWT CONFIG
jwt.secret=${JWT_SECRETE}


# Actuator Config, Health Monitoring
management.endpoints.web.exposure.include=*

















